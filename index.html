<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Core 1 Trainer \u2014 CompTIA A+ 220-1101 Study App</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#080b08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A+ Trainer">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png" type="image/png">
<style>
  body{ margin:0; background:#080b08; display:flex; justify-content:center; padding:calc(24px + env(safe-area-inset-top)) 12px calc(24px + env(safe-area-inset-bottom)); }
  #app-root-wrap{ width:100%; max-width:480px; }
  :root{
    --void:#080b08;
    --surface:#0e130e;
    --surface-raised:#141c14;
    --border:#1f2e1f;
    --green:#00FF41;
    --green-dim:#0e8f28;
    --amber:#FFB000;
    --red:#FF4444;
    --text:#dff2e0;
    --text-muted:#5f7a63;
    --mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  #app-root{
    background:var(--void);
    color:var(--text);
    font-family:var(--sans);
    min-height:600px;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    background-image:
      linear-gradient(rgba(0,255,65,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,65,0.025) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .screen{ padding: 22px 20px 32px; animation: fadeIn .25s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:translateY(0)} }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px; font-family:var(--mono);
  }
  .brand{ display:flex; align-items:center; gap:8px; font-family:var(--mono); font-weight:700; font-size:15px; letter-spacing:.5px;}
  .brand .cursor{ display:inline-block; width:8px; height:16px; background:var(--green); animation:blink 1.1s step-end infinite; }
  @keyframes blink{ 50%{ opacity:0; } }
  .stat-pill{
    display:flex; align-items:center; gap:6px; background:var(--surface-raised);
    border:1px solid var(--border); border-radius:20px; padding:9px 14px; font-size:13px; font-family:var(--mono);
    color:var(--text); font-family:inherit; min-height:38px;
  }
  .stat-pill.clickable{ cursor:pointer; transition:.12s; touch-action:manipulation; -webkit-tap-highlight-color:rgba(0,255,65,0.25); }
  .stat-pill.clickable:hover, .stat-pill.clickable:active{ border-color:var(--green-dim); background:var(--surface); }
  .stat-row{ display:flex; gap:8px; }

  .modal-overlay{
    position:absolute; inset:0; background:rgba(4,6,4,0.82); display:flex; align-items:center; justify-content:center;
    z-index:50; border-radius:12px; padding:20px; animation:fadeIn .15s ease;
  }
  .modal-card{
    background:var(--surface-raised); border:1px solid var(--border); border-radius:14px; padding:24px 22px;
    width:100%; max-width:300px; text-align:center;
  }
  .modal-icon{ font-size:32px; margin-bottom:6px; }
  .modal-big{ font-family:var(--mono); font-size:28px; font-weight:700; }
  .modal-label{ color:var(--text-muted); font-family:var(--mono); font-size:11px; letter-spacing:.5px; margin-bottom:16px; }
  .modal-row{ display:flex; justify-content:space-between; font-size:13px; padding:8px 0; border-top:1px solid var(--border); text-align:left; }
  .modal-note{ color:var(--text-muted); font-size:12px; line-height:1.5; margin:14px 0; text-align:left; }
  .amber{ color:var(--amber); }
  .green{ color:var(--green); }
  .muted{ color:var(--text-muted); }

  h1.title{ font-family:var(--mono); font-size:20px; letter-spacing:.3px; margin:4px 0 2px; }
  p.subtitle{ color:var(--text-muted); font-size:13px; margin:0 0 20px; }

  .diag-cta{
    background:linear-gradient(135deg, rgba(0,255,65,0.08), rgba(0,255,65,0.02));
    border:1px solid var(--green-dim); border-radius:10px; padding:14px 16px; margin-bottom:22px;
    display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:.15s;
  }
  .diag-cta:hover{ border-color:var(--green); background:rgba(0,255,65,0.1); }
  .diag-cta .label{ font-family:var(--mono); font-size:13px; }
  .diag-cta .label b{ display:block; font-size:14.5px; color:var(--green); margin-bottom:2px;}
  .arrow{ font-family:var(--mono); color:var(--green); }

  .domain-card{
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:16px; margin-bottom:12px; cursor:pointer; transition:.15s;
  }
  .domain-card:hover{ border-color:var(--green-dim); transform:translateY(-1px); }
  .domain-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .domain-code{ font-family:var(--mono); font-size:10.5px; color:var(--text-muted); letter-spacing:.5px;}
  .domain-name{ font-size:15.5px; font-weight:600; margin-top:2px;}
  .domain-pct{ font-family:var(--mono); font-size:13px; color:var(--green); }
  .barwrap{ background:#0a100a; border:1px solid var(--border); border-radius:6px; height:8px; overflow:hidden; }
  .barfill{ height:100%; background:linear-gradient(90deg, var(--green-dim), var(--green)); transition:width .4s ease; }
  .domain-meta{ display:flex; justify-content:space-between; margin-top:8px; font-family:var(--mono); font-size:11px; color:var(--text-muted); }

  .lesson-row{
    display:flex; align-items:center; gap:14px; background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:.15s;
  }
  .lesson-row:hover{ border-color:var(--green-dim); }
  .lesson-icon{
    width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:13px; flex-shrink:0; border:1px solid var(--border);
  }
  .lesson-icon.done{ background:rgba(0,255,65,0.1); color:var(--green); border-color:var(--green-dim); }
  .lesson-icon.todo{ background:var(--surface-raised); color:var(--text-muted); }
  .lesson-title{ font-size:14px; font-weight:600; }
  .lesson-sub{ font-size:11.5px; color:var(--text-muted); font-family:var(--mono); margin-top:2px;}
  .backbtn{ background:none; border:none; color:var(--text-muted); font-family:var(--mono); font-size:13px; cursor:pointer; padding:0; margin-bottom:14px; display:flex; align-items:center; gap:6px;}
  .backbtn:hover{ color:var(--green); }

  .progressbar-top{ height:5px; background:var(--surface-raised); border-radius:4px; overflow:hidden; margin-bottom:22px;}
  .progressbar-top-fill{ height:100%; background:var(--green); transition:width .3s ease; }

  .qcard{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
  .qmeta{ font-family:var(--mono); font-size:11px; color:var(--text-muted); margin-bottom:10px; letter-spacing:.4px;}
  .qtext{ font-size:16.5px; line-height:1.5; font-weight:600; }

  .opt{
    display:block; width:100%; text-align:left; background:var(--surface); border:1.5px solid var(--border);
    color:var(--text); padding:14px 16px; border-radius:10px; margin-bottom:10px; font-size:14.5px;
    cursor:pointer; transition:.12s; font-family:var(--sans);
  }
  .opt:hover:not(:disabled){ border-color:var(--green-dim); background:var(--surface-raised); }
  .opt:disabled{ cursor:default; }
  .opt.correct{ border-color:var(--green); background:rgba(0,255,65,0.1); color:var(--green); }
  .opt.incorrect{ border-color:var(--red); background:rgba(255,68,68,0.08); color:#ff8080; }
  .opt.faded{ opacity:.45; }

  .feedback-banner{ font-family:var(--mono); font-weight:700; font-size:13px; letter-spacing:.5px; margin-bottom:6px; }
  .feedback-banner.ok{ color:var(--green); }
  .feedback-banner.bad{ color:var(--red); }

  .explain-box{ background:var(--surface-raised); border:1px solid var(--border); border-left:3px solid var(--green-dim); border-radius:8px; padding:14px 16px; margin-top:14px; font-size:13.5px; line-height:1.55; color:#c3dcc6; }
  .explain-box b{ color:var(--text); }

  .hint-btn{ background:none; border:1px solid var(--border); color:var(--amber); font-family:var(--mono); font-size:12px; padding:8px 14px; border-radius:8px; cursor:pointer; margin-top:10px; }
  .hint-btn:hover{ border-color:var(--amber); background:rgba(255,176,0,0.08); }
  .hint-box{ background:rgba(255,176,0,0.06); border:1px solid rgba(255,176,0,0.35); border-radius:8px; padding:12px 14px; margin-top:10px; font-size:13px; color:#ffd280; line-height:1.5;}

  .primary-btn{
    width:100%; background:var(--green); color:#04120a; border:none; border-radius:10px; padding:14px;
    font-family:var(--mono); font-weight:700; font-size:14px; cursor:pointer; margin-top:6px; transition:.15s;
  }
  .primary-btn:hover{ background:#33ff66; }
  .primary-btn:disabled{ background:var(--surface-raised); color:var(--text-muted); cursor:not-allowed; }
  .ghost-btn{
    width:100%; background:none; color:var(--text-muted); border:1px solid var(--border); border-radius:10px; padding:12px;
    font-family:var(--mono); font-size:13px; cursor:pointer; margin-top:8px;
  }
  .ghost-btn:hover{ border-color:var(--green-dim); color:var(--green); }

  .result-ring{ width:150px; height:150px; margin:12px auto 18px; position:relative; }
  .result-ring svg{ transform:rotate(-90deg); }
  .result-ring .pct{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; font-family:var(--mono); }
  .result-ring .pct b{ font-size:30px; color:var(--green); }
  .result-ring .pct span{ font-size:10px; color:var(--text-muted); }

  .breakdown-row{ display:flex; justify-content:space-between; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:8px; font-size:13px;}
  .breakdown-row .weak{ color:var(--amber); font-family:var(--mono); font-size:11px; }
  .breakdown-row.clickable{ cursor:pointer; transition:.12s; }
  .breakdown-row.clickable:hover{ border-color:var(--green-dim); background:var(--surface-raised); }

  .history-strip{
    display:flex; justify-content:space-between; align-items:center; background:var(--surface);
    border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:16px;
  }
  .history-main{ display:flex; align-items:baseline; gap:8px; font-family:var(--mono); }
  .history-main b{ font-size:18px; color:var(--green); }
  .history-main .muted{ font-size:11px; }
  .history-trend{ font-family:var(--mono); font-size:12px; }

  .trend-line{ text-align:center; font-family:var(--mono); font-size:12.5px; margin-bottom:16px; }
  .trend-line.green{ color:var(--green); }
  .trend-line.amber{ color:var(--amber); }

  .review-line{ font-size:13.5px; margin-bottom:6px; }

  .streak-flame{ font-family:var(--mono); }
  ::selection{ background:rgba(0,255,65,0.3); }
  .empty-note{ text-align:center; color:var(--text-muted); font-size:12.5px; margin-top:26px; font-family:var(--mono); line-height:1.6; }
</style>
</head>
<body>
<div id="app-root-wrap">
<div id="app-root"></div>
</div>

<script>
(function(){

const DOMAINS = [
  {
    key:"mobile", code:"220-1101 \u00b7 1.0", name:"Mobile Devices",
    lessons:[
      { key:"mobile-1", title:"Laptop Hardware & Docking", questions:[
        { q:"A technician needs to replace a laptop's internal wireless card. What must be done immediately before removing the antenna leads?", opts:["Power off the laptop and disconnect it from AC power / remove the battery","Update the BIOS to the latest version","Boot into Safe Mode","Reinstall the wireless driver first"], correct:0,
          exp:"Always fully power down and disconnect power (and remove the battery if it's removable) before opening a laptop. Working on live components risks short-circuiting the board or injuring the tech."},
        { q:"Which device connects to a laptop through a single proprietary port and can supply charging, multiple video outputs, and extra USB/Ethernet ports?", opts:["Port replicator","Docking station","KVM switch","USB hub"], correct:1,
          exp:"A docking station adds real functionality \u2014 charging, extra video outputs, sometimes even additional processing \u2014 through one connector. This is the key distinction the exam tests."},
        { q:"How does a port replicator differ from a docking station?", opts:["A port replicator adds a discrete GPU","A port replicator simply extends the laptop's existing ports without adding new capability","A port replicator only works over Wi-Fi","There is no meaningful difference"], correct:1,
          exp:"A port replicator is essentially a pass-through for ports the laptop already has (more USB, extend the existing video output). A docking station can add capability the laptop doesn't natively have."},
        { q:"A laptop's keyboard needs replacing. What is the correct general order of operations?", opts:["Remove keyboard first, then power off","Power off, disconnect power/battery, then remove keyboard per the FRU (field replaceable unit) procedure","Replace while the OS is running to test immediately","Remove the screen first"], correct:1,
          exp:"Standard laptop hardware replacement order: power down \u2192 disconnect power source \u2192 follow the specific FRU removal steps (often removing a back panel or keyboard retaining screws)."},
        { q:"Which of these is typically NOT a laptop expansion option for adding storage or connectivity?", opts:["M.2 slot","SODIMM slot","Full-length PCIe x16 slot","SD card reader"], correct:2,
          exp:"Full-length PCIe x16 slots are a desktop motherboard feature for discrete graphics cards \u2014 laptops don't have room for them. M.2, SODIMM (RAM), and SD readers are all common on laptops."}
      ]},
      { key:"mobile-2", title:"Mobile Connectivity", questions:[
        { q:"Which short-range wireless technology, with an effective range of about 4cm, is used for contactless payments and quick device pairing?", opts:["Bluetooth","Infrared (IR)","NFC","RFID"], correct:2,
          exp:"NFC (Near Field Communication) operates at very short range (a few centimeters) and is the technology behind tap-to-pay and quick pairing taps. Bluetooth has a much longer range."},
        { q:"A phone is sharing its cellular data connection as a Wi-Fi network for a laptop. What is this feature called?", opts:["Mobile hotspot / tethering","Airplane mode","VPN passthrough","NFC beaming"], correct:0,
          exp:"Tethering (mobile hotspot) turns the phone's cellular data into a Wi-Fi (or USB/Bluetooth) connection other devices can use."},
        { q:"Which cellular generation is defined by the ability to exceed roughly 1 Gbps theoretical speed and significantly lower latency than its predecessor?", opts:["3G","4G LTE","5G","GSM"], correct:2,
          exp:"5G is the generation associated with multi-gigabit theoretical speeds and much lower latency, enabling things like network slicing and improved IoT support."},
        { q:"A user's phone won't pair with a new Bluetooth headset. What is the first troubleshooting step?", opts:["Factory reset the phone","Put the headset into pairing/discovery mode and ensure Bluetooth is enabled on the phone","Replace the headset battery","Update the phone's OS"], correct:1,
          exp:"Pairing failures are most often solved by confirming both devices are actually in discovery/pairing mode with Bluetooth enabled \u2014 the simplest check before anything more invasive."},
        { q:"Which mobile connectivity method uses line-of-sight and is largely obsolete for modern phone-to-phone transfer, but still appears on some remote controls?", opts:["Infrared (IR)","NFC","Bluetooth LE","Wi-Fi Direct"], correct:0,
          exp:"Infrared requires direct line-of-sight and short range, which is why it faded from phone-to-phone transfer but persists in remote controls and some older device pairing."}
      ]},
      { key:"mobile-3", title:"Mobile OS & Accessories", questions:[
        { q:"Installing an app from outside the official app store (not Google Play / App Store) is known as what, and is generally considered a security risk?", opts:["Sideloading","Tethering","OTA updating","Synchronizing"], correct:0,
          exp:"Sideloading means installing an app package directly rather than through the vetted official store, which bypasses the store's security review \u2014 a common exam topic tied to mobile security risk."},
        { q:"Which authentication method relies on a physical trait like a fingerprint or face scan?", opts:["PIN authentication","Biometric authentication","Pattern lock","Two-step verification via SMS"], correct:1,
          exp:"Biometric authentication uses a unique physical characteristic (fingerprint, face, iris) rather than something the user memorizes or types."},
        { q:"A phone's touchscreen registers taps in the wrong location, though the display looks fine. Which component is most likely at fault?", opts:["The digitizer","The battery","The SIM card","The speaker"], correct:0,
          exp:"The digitizer is the layer that senses touch input; the display (LCD/OLED) and digitizer are separate components, so a digitizer fault can misregister touches while the picture itself still looks correct."},
        { q:"Which mobile accessory allows a phone to accept credit card payments directly?", opts:["A card reader attachment","A stylus","A protective case","A screen protector"], correct:0,
          exp:"A card reader (magnetic stripe or chip reader) plugs into or pairs with the phone so payment apps can process transactions on the spot."},
        { q:"What is the main purpose of enabling remote wipe / 'Find My Device' on a company phone?", opts:["To improve battery life","To locate, lock, or erase a lost or stolen device remotely, protecting the data on it","To speed up app downloads","To reduce cellular data usage"], correct:1,
          exp:"Remote wipe/locate features exist specifically so a lost or stolen device's data can be protected \u2014 either by locking it down or erasing it entirely before someone else can access it."},
        { q:"Which is a common way mobile OSes keep contacts, calendar, and photos synced automatically across a user's devices?", opts:["Cloud-based account sync (e.g., iCloud or a Google account)","Manual USB transfer every time","Bluetooth pairing only","Infrared beaming"], correct:0,
          exp:"Modern mobile OSes sync data through the user's cloud account (iCloud, Google, etc.) in the background, keeping contacts/calendar/photos consistent across every signed-in device without manual transfers."}
      ]}
    ]
  },
  {
    key:"networking", code:"220-1101 \u00b7 2.0", name:"Networking",
    lessons:[
      { key:"net-1", title:"Ports & Protocols", questions:[
        { q:"Which port number is used by SSH?", opts:["TCP 21","TCP 22","TCP 23","UDP 22"], correct:1,
          exp:"SSH uses TCP port 22. It's easy to confuse with Telnet (TCP 23) or FTP control (TCP 21) \u2014 SSH is the secure remote-access replacement for Telnet."},
        { q:"FTP uses two separate ports. Which pair is correct?", opts:["TCP 20 (data) and TCP 21 (control)","TCP 21 (data) and TCP 20 (control)","UDP 20 and UDP 21","TCP 20 and UDP 21"], correct:0,
          exp:"FTP splits data and control: TCP 20 handles the actual data transfer, TCP 21 handles the control/command channel. Both are TCP, not UDP."},
        { q:"Which protocol and port does DHCP use for the server listening for client requests?", opts:["TCP port 67","UDP port 67 (server) / UDP port 68 (client)","TCP port 68","UDP port 53"], correct:1,
          exp:"DHCP is UDP-based: the server listens on UDP 67, and clients listen on UDP 68. DNS (port 53) is a separate protocol often confused with DHCP."},
        { q:"Which port does DNS use, and which transport protocol is most common for standard lookups?", opts:["Port 53, primarily UDP (TCP used for zone transfers/large responses)","Port 53, TCP only","Port 43, UDP only","Port 80, TCP only"], correct:0,
          exp:"DNS uses port 53. Standard queries are UDP for speed, but it falls back to TCP for zone transfers or responses too large for a single UDP packet."},
        { q:"SMTP, used for sending email, uses which default port?", opts:["TCP 25","TCP 110","TCP 143","UDP 25"], correct:0,
          exp:"SMTP (sending mail) is TCP port 25 by default (587 is common for authenticated submission). POP3 (110) and IMAP (143) are for retrieving mail, not sending."},
        { q:"Which pair correctly matches a mail retrieval protocol to its port?", opts:["POP3 = TCP 110, IMAP = TCP 143","POP3 = TCP 143, IMAP = TCP 110","POP3 = UDP 110, IMAP = UDP 143","POP3 = TCP 25, IMAP = TCP 110"], correct:0,
          exp:"POP3 downloads and typically removes mail from the server on TCP 110. IMAP keeps mail synced on the server on TCP 143. Mixing these two up is one of the most common port-memorization mistakes."}
      ]},
      { key:"net-2", title:"Networking Tools & Wireless", questions:[
        { q:"Which tool would you use to test whether a specific TCP/UDP port is open on a remote host?", opts:["Loopback plug","Port scanner","Toner probe","Cable crimper"], correct:1,
          exp:"A port scanner (like nmap) probes a host to see which ports are open/listening \u2014 useful for both troubleshooting and security assessment."},
        { q:"A technician needs to trace which physical cable in a wiring closet corresponds to a specific wall jack. What tool pairing is used?", opts:["Toner probe (tone generator + probe)","Cable tester only","Punch-down tool","Wi-Fi analyzer"], correct:0,
          exp:"A tone generator injects a signal onto a cable, and the probe 'listens' for that tone to identify the matching cable at the other end \u2014 the classic tool for tracing unlabeled runs."},
        { q:"Which tool would best help a technician identify Wi-Fi channel congestion or rogue access points?", opts:["Wi-Fi analyzer","Cable certifier","Punch-down tool","Loopback adapter"], correct:0,
          exp:"A Wi-Fi analyzer surveys the wireless spectrum \u2014 showing channel usage, signal strength, and nearby SSIDs \u2014 which is exactly what's needed to diagnose interference or unauthorized APs."},
        { q:"A device Mobile Device Management (MDM) policy needs to be removed from a company phone before it's reassigned. What is the general correct approach?", opts:["Just delete the MDM app icon from the home screen","Un-enroll the device through the MDM profile/settings, then remove the management profile, which also removes the app's control","Restart the phone in Safe Mode","Change the phone's Wi-Fi password"], correct:1,
          exp:"MDM apps are installed via a management profile that has elevated device control. Simply deleting the app icon typically won't fully remove it \u2014 you must un-enroll / remove the profile through Settings (or have IT push the removal) so the management control is properly revoked."},
        { q:"Which of these best describes the purpose of a VLAN?", opts:["Logically segments a physical network into separate broadcast domains","Physically separates cables in a rack","Encrypts traffic between two routers","Increases a switch's port count"], correct:0,
          exp:"A VLAN (Virtual LAN) segments one physical switch/network into multiple logical broadcast domains \u2014 improving security and traffic management without needing separate physical hardware."}
      ]},
      { key:"net-3", title:"IP Addressing & SOHO Networks", questions:[
        { q:"Which of these is a private (non-routable on the public internet) IPv4 address?", opts:["192.168.1.10","8.8.8.8","1.1.1.1","172.32.0.5"], correct:0,
          exp:"192.168.0.0/16 is one of the three private IPv4 ranges (with 10.0.0.0/8 and 172.16.0.0\u2013172.31.255.255). Note 172.32.0.5 is a common trap \u2014 it's just outside the private 172.16\u2013172.31 range, so it's actually public."},
        { q:"What is the key structural difference between IPv4 and IPv6 addressing?", opts:["IPv6 uses 128-bit addresses, giving a vastly larger address space than IPv4's 32-bit addresses","IPv6 is only used on private networks","IPv4 supports more devices than IPv6","There is no difference in address length"], correct:0,
          exp:"IPv4's 32-bit space (about 4.3 billion addresses) has been effectively exhausted, which is the whole reason IPv6's 128-bit space \u2014 astronomically larger \u2014 exists."},
        { q:"Which wireless security protocol is the current strongest standard, succeeding WPA2?", opts:["WEP","WPA","WPA2","WPA3"], correct:3,
          exp:"WPA3 is the current standard, adding stronger encryption and protections (like resistance to offline dictionary attacks) over WPA2. WEP is long obsolete and easily broken."},
        { q:"On a SOHO router, what does enabling UPnP (Universal Plug and Play) do?", opts:["Automatically opens ports for applications that request them","Encrypts all outbound traffic","Disables the guest network","Forces all devices onto a single VLAN"], correct:0,
          exp:"UPnP lets applications (games, torrent clients, etc.) automatically request port forwarding from the router. Convenient, but it's also a security tradeoff since it opens ports without manual review."},
        { q:"A phone connects wirelessly to a smartwatch over a very short range using Bluetooth. What type of network is this?", opts:["WAN","MAN","LAN","PAN"], correct:3,
          exp:"A PAN (Personal Area Network) covers a very short range around one person/their devices \u2014 classic examples are Bluetooth-connected phones, watches, and headsets."},
        { q:"Which internet connection type uses existing telephone lines but doesn't tie up voice service the way old dial-up did?", opts:["DSL","Dial-up","Satellite","Fiber"], correct:0,
          exp:"DSL (Digital Subscriber Line) runs over standard copper phone lines but uses separate frequency bands from voice calls, so unlike dial-up, the internet connection and phone line can be used simultaneously."}
      ]}

// ---------- State ----------
// Question allocation for the diagnostic mirrors the real 220-1101 exam blueprint weighting,
// so a diagnostic score is actually representative rather than a random slice.
const EXAM_WEIGHTS = { mobile:0.15, networking:0.20, hardware:0.25, virt:0.11, trouble:0.29 };
const DIAGNOSTIC_SIZE = 20;

let state = {
  xp:0, streak:0, longestStreak:0, lastActiveDate:null,
  domainStats:{}, // key -> {correct, total}
  lessonDone:{},  // lessonKey -> true
  diagnosticHistory:[], // [{date, pct, correct, total, domainPct}] newest first
  screen:"home",
  activeDomain:null, activeLesson:null,
  quizQueue:[], quizIndex:0, quizAnswers:[], quizMode:"lesson", // 'lesson' | 'diagnostic'
  selectedOpt:null, answered:false,
  hint:null, hintLoading:false,
  modal:null // null | 'streak' | 'xp'
};

async function loadState(){
  try{
    const raw = localStorage.getItem('aplus-progress');
    if(raw){ const saved = JSON.parse(raw); state = Object.assign(state, saved, {screen:"home", quizQueue:[], quizIndex:0, quizAnswers:[], selectedOpt:null, answered:false, hint:null, hintLoading:false, modal:null}); }
  }catch(e){ /* no saved state yet */ }
  if(!state.diagnosticHistory) state.diagnosticHistory = [];
  if(!state.longestStreak) state.longestStreak = state.streak || 0;
  render();
}
async function saveState(){
  try{
    const toSave = { xp:state.xp, streak:state.streak, longestStreak:state.longestStreak, lastActiveDate:state.lastActiveDate, domainStats:state.domainStats, lessonDone:state.lessonDone, diagnosticHistory:state.diagnosticHistory };
    localStorage.setItem('aplus-progress', JSON.stringify(toSave));
  }catch(e){ console.error('save failed', e); }
}

function todayStr(){ return new Date().toDateString(); }
function bumpStreak(){
  const today = todayStr();
  if(state.lastActiveDate === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  if(state.lastActiveDate === y.toDateString()) state.streak += 1;
  else state.streak = 1;
  state.lastActiveDate = today;
  if(state.streak > state.longestStreak) state.longestStreak = state.streak;
}

function domainProgress(domain){
  let total=0, done=0;
  domain.lessons.forEach(l=>{ total++; if(state.lessonDone[l.key]) done++; });
  return Math.round((done/total)*100);
}
function allQuestions(){
  let qs=[];
  DOMAINS.forEach(d=>d.lessons.forEach(l=>l.questions.forEach(q=>qs.push({...q, domainKey:d.key, domainName:d.name}))));
  return qs;
}
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startLesson(domainKey, lessonKey){
  const domain = DOMAINS.find(d=>d.key===domainKey);
  const lesson = domain.lessons.find(l=>l.key===lessonKey);
  state.activeDomain = domainKey; state.activeLesson = lessonKey;
  state.quizQueue = lesson.questions.map(q=>({...q, domainKey}));
  state.quizIndex = 0; state.quizAnswers = []; state.quizMode = "lesson";
  state.selectedOpt=null; state.answered=false; state.hint=null;
  state.screen = "quiz"; render();
}
function startDiagnostic(){
  const keys = Object.keys(EXAM_WEIGHTS);
  const counts = {}; let allocated = 0;
  keys.forEach(k=>{ const c = Math.round(EXAM_WEIGHTS[k]*DIAGNOSTIC_SIZE); counts[k]=c; allocated+=c; });
  const diff = DIAGNOSTIC_SIZE - allocated;
  if(diff !== 0) counts[keys[keys.length-1]] += diff; // absorb any rounding drift on the last domain
  const pool = allQuestions();
  let qs = [];
  keys.forEach(k=>{
    const domainQs = pool.filter(q=>q.domainKey===k);
    qs = qs.concat(shuffle(domainQs).slice(0, Math.min(counts[k], domainQs.length)));
  });
  qs = shuffle(qs);
  state.quizQueue = qs; state.quizIndex=0; state.quizAnswers=[]; state.quizMode="diagnostic";
  state.selectedOpt=null; state.answered=false; state.hint=null;
  state.screen="quiz"; render();
}

function selectOption(i){
  if(state.answered) return;
  state.selectedOpt = i; state.answered = true;
  const q = state.quizQueue[state.quizIndex];
  const isCorrect = i === q.correct;
  state.quizAnswers.push({domainKey:q.domainKey, correct:isCorrect, q:q, selected:i});
  if(!state.domainStats[q.domainKey]) state.domainStats[q.domainKey] = {correct:0,total:0};
  state.domainStats[q.domainKey].total++;
  if(isCorrect){ state.domainStats[q.domainKey].correct++; state.xp += 10; bumpStreak(); }
  saveState();
  render();
}

function nextQuestion(){
  state.selectedOpt=null; state.answered=false; state.hint=null;
  if(state.quizIndex < state.quizQueue.length - 1){
    state.quizIndex++; render();
  } else {
    if(state.quizMode === "lesson"){
      state.lessonDone[state.activeLesson] = true;
      saveState();
    } else if(state.quizMode === "diagnostic"){
      const total = state.quizAnswers.length;
      const correct = state.quizAnswers.filter(a=>a.correct).length;
      const pct = Math.round((correct/total)*100);
      const byDomain = {};
      state.quizAnswers.forEach(a=>{ if(!byDomain[a.domainKey]) byDomain[a.domainKey]={c:0,t:0}; byDomain[a.domainKey].t++; if(a.correct) byDomain[a.domainKey].c++; });
      const domainPct = {};
      Object.keys(byDomain).forEach(k=> domainPct[k] = Math.round((byDomain[k].c/byDomain[k].t)*100));
      state.diagnosticHistory.unshift({ date:new Date().toISOString(), pct, correct, total, domainPct });
      state.diagnosticHistory = state.diagnosticHistory.slice(0,10);
      saveState();
    }
    state.screen = "results"; render();
  }
}

async function askHint(){
  const q = state.quizQueue[state.quizIndex];
  state.hintLoading = true; render();
  try{
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:200,
        messages:[{ role:"user", content:
          "You are a CompTIA A+ tutor. A student is stuck on this practice question. Give ONE short, Socratic hint (2-3 sentences max) that points them toward the right concept WITHOUT revealing the answer choice or directly naming the correct option text. Question: \""+q.q+"\" Options: "+q.opts.map((o,idx)=>String.fromCharCode(65+idx)+") "+o).join(", ")
        }]
      })
    });
    const data = await resp.json();
    const textBlock = (data.content||[]).find(b=>b.type==="text");
    state.hint = textBlock ? textBlock.text : "Couldn't get a hint right now \u2014 try reasoning through what each option actually does.";
  }catch(e){
    state.hint = "Hint service unavailable right now. Re-read the question and eliminate the options that don't match the core concept being tested.";
  }
  state.hintLoading = false; render();
}

function goHome(){ state.screen="home"; render(); }
function openDomain(key){ state.activeDomain=key; state.screen="domain"; render(); }
function openReview(){ state.screen="review"; render(); }
function backToResults(){ state.screen="results"; render(); }
function exitQuiz(){
  state.selectedOpt=null; state.answered=false; state.hint=null;
  if(state.quizMode === "lesson" && state.activeDomain){ openDomain(state.activeDomain); }
  else { goHome(); }
}
function openModal(type){ state.modal = type; render(); }
function closeModal(){ state.modal = null; render(); }
function practiceWeakest(){
  const last = state.diagnosticHistory[0];
  if(!last) return goHome();
  let weakestKey = null, weakestPct = 101;
  Object.keys(last.domainPct).forEach(k=>{ if(last.domainPct[k] < weakestPct){ weakestPct = last.domainPct[k]; weakestKey = k; } });
  if(weakestKey) openDomain(weakestKey); else goHome();
}

// ---------- Render ----------
function esc(s){ const d=document.createElement('div'); d.innerText=s; return d.innerHTML; }

function render(){
  const root = document.getElementById('app-root');
  let html = "";

  if(state.screen === "home"){
    const totalLessons = DOMAINS.reduce((a,d)=>a+d.lessons.length,0);
    const doneLessons = Object.keys(state.lessonDone).length;
    html += topbarHtml();
    html += `<h1 class="title">Core 1 Trainer</h1><p class="subtitle">CompTIA A+ 220-1101 \u00b7 free & unlocked, no paywall</p>`;
    html += `<div class="diag-cta" onclick="__aplus.startDiagnostic()">
      <div class="label"><b>Run Diagnostic Test</b><span class="muted">20 questions, weighted to match the real exam blueprint</span></div>
      <div class="arrow">&gt;_</div>
    </div>`;
    if(state.diagnosticHistory && state.diagnosticHistory.length){
      const last = state.diagnosticHistory[0];
      const prev = state.diagnosticHistory[1];
      const dateStr = new Date(last.date).toLocaleDateString(undefined,{month:'short', day:'numeric'});
      let trendHtml = '<span class="muted">first diagnostic on record</span>';
      if(prev){
        const delta = last.pct - prev.pct;
        const sign = delta>=0 ? '+' : '';
        trendHtml = `<span class="${delta>=0?'green':'amber'}">${sign}${delta}pt</span> <span class="muted">vs previous run</span>`;
      }
      html += `<div class="history-strip">
        <div class="history-main"><b>${last.pct}%</b><span class="muted">last diagnostic \u00b7 ${dateStr}</span></div>
        <div class="history-trend">${trendHtml}</div>
      </div>`;
    }
    DOMAINS.forEach(d=>{
      const pct = domainProgress(d);
      const stat = state.domainStats[d.key];
      const acc = stat && stat.total ? Math.round((stat.correct/stat.total)*100) : null;
      html += `<div class="domain-card" onclick="__aplus.openDomain('${d.key}')">
        <div class="domain-head">
          <div><div class="domain-code">${d.code}</div><div class="domain-name">${d.name}</div></div>
          <div class="domain-pct">${pct}%</div>
        </div>
        <div class="barwrap"><div class="barfill" style="width:${pct}%"></div></div>
        <div class="domain-meta"><span>${d.lessons.length} lessons</span><span>${acc!==null ? 'accuracy '+acc+'%' : 'not started'}</span></div>
      </div>`;
    });
    html += `<div class="empty-note">${doneLessons}/${totalLessons} lessons complete \u2014 keep going.</div>`;
  }

  else if(state.screen === "domain"){
    const d = DOMAINS.find(x=>x.key===state.activeDomain);
    html += topbarHtml();
    html += `<button class="backbtn" onclick="__aplus.goHome()">&lt; back</button>`;
    html += `<div class="domain-code">${d.code}</div><h1 class="title">${d.name}</h1><p class="subtitle">${d.lessons.length} lessons</p>`;
    d.lessons.forEach(l=>{
      const done = state.lessonDone[l.key];
      html += `<div class="lesson-row" onclick="__aplus.startLesson('${d.key}','${l.key}')">
        <div class="lesson-icon ${done?'done':'todo'}">${done?'\u2713':'\u25B8'}</div>
        <div><div class="lesson-title">${l.title}</div><div class="lesson-sub">${l.questions.length} questions</div></div>
      </div>`;
    });
  }

  else if(state.screen === "quiz"){
    const q = state.quizQueue[state.quizIndex];
    const pct = Math.round(((state.quizIndex)/state.quizQueue.length)*100);
    html += topbarHtml(true);
    html += `<button class="backbtn" onclick="__aplus.exitQuiz()">&lt; exit ${state.quizMode==='diagnostic'?'diagnostic':'lesson'}</button>`;
    html += `<div class="progressbar-top"><div class="progressbar-top-fill" style="width:${pct}%"></div></div>`;
    html += `<div class="qcard">
      <div class="qmeta">QUESTION ${state.quizIndex+1} / ${state.quizQueue.length} ${state.quizMode==='diagnostic' ? '\u00b7 '+q.domainName : ''}</div>
      <div class="qtext">${esc(q.q)}</div>
    </div>`;
    q.opts.forEach((opt,i)=>{
      let cls = "opt";
      if(state.answered){
        if(i===q.correct) cls += " correct";
        else if(i===state.selectedOpt) cls += " incorrect";
        else cls += " faded";
      }
      html += `<button class="${cls}" ${state.answered?'disabled':''} onclick="__aplus.selectOption(${i})">${esc(opt)}</button>`;
    });
    if(!state.answered){
      html += `<button class="hint-btn" onclick="__aplus.askHint()" ${state.hintLoading?'disabled':''}>${state.hintLoading?'thinking\u2026':'\ud83d\udca1 Ask for a hint'}</button>`;
      if(state.hint) html += `<div class="hint-box">${esc(state.hint)}</div>`;
    }
    if(state.answered){
      const isCorrect = state.selectedOpt === q.correct;
      html += `<div class="feedback-banner ${isCorrect?'ok':'bad'}">${isCorrect?'CORRECT':'INCORRECT'}</div>`;
      html += `<div class="explain-box"><b>Why:</b> ${esc(q.exp)}</div>`;
      html += `<button class="primary-btn" onclick="__aplus.nextQuestion()">Continue</button>`;
    }
  }

  else if(state.screen === "results"){
    const total = state.quizAnswers.length;
    const correct = state.quizAnswers.filter(a=>a.correct).length;
    const pct = Math.round((correct/total)*100);
    const circumference = 2*Math.PI*64;
    const offset = circumference - (pct/100)*circumference;
    html += topbarHtml();
    html += `<h1 class="title">${state.quizMode==='diagnostic'?'Diagnostic Results':'Lesson Complete'}</h1>`;
    html += `<div class="result-ring">
      <svg width="150" height="150"><circle cx="75" cy="75" r="64" stroke="#1f2e1f" stroke-width="10" fill="none"/>
      <circle cx="75" cy="75" r="64" stroke="#00FF41" stroke-width="10" fill="none" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>
      <div class="pct"><b>${pct}%</b><span>${correct}/${total} correct</span></div>
    </div>`;
    const missedCount = state.quizAnswers.filter(a=>!a.correct).length;
    if(state.quizMode === "diagnostic"){
      const prev = state.diagnosticHistory[1];
      if(prev){
        const delta = pct - prev.pct;
        const sign = delta>=0 ? '+' : '';
        html += `<div class="trend-line ${delta>=0?'green':'amber'}">${sign}${delta}pt vs your last diagnostic (${prev.pct}%)</div>`;
      }
      const byDomain = {};
      state.quizAnswers.forEach(a=>{ if(!byDomain[a.domainKey]) byDomain[a.domainKey]={c:0,t:0}; byDomain[a.domainKey].t++; if(a.correct) byDomain[a.domainKey].c++; });
      Object.keys(byDomain).forEach(k=>{
        const d = DOMAINS.find(x=>x.key===k);
        const p = Math.round((byDomain[k].c/byDomain[k].t)*100);
        html += `<div class="breakdown-row clickable" onclick="__aplus.openDomain('${k}')"><span>${d.name}</span><span>${p<70?'<span class="weak">WEAK &middot; </span>':''}${p}%</span></div>`;
      });
      html += `<button class="ghost-btn" onclick="__aplus.practiceWeakest()">Practice weakest domain \u2192</button>`;
    }
    if(missedCount > 0){
      html += `<button class="ghost-btn" onclick="__aplus.openReview()">Review ${missedCount} missed question${missedCount>1?'s':''}</button>`;
    }
    html += `<button class="primary-btn" onclick="__aplus.goHome()">Back to Dashboard</button>`;
  }

  else if(state.screen === "review"){
    html += topbarHtml();
    html += `<button class="backbtn" onclick="__aplus.backToResults()">&lt; back to results</button>`;
    html += `<h1 class="title">Missed Questions</h1><p class="subtitle">Review why, not just what</p>`;
    const missed = state.quizAnswers.filter(a=>!a.correct);
    if(missed.length === 0){
      html += `<div class="empty-note">Nothing missed \u2014 clean run.</div>`;
    }
    missed.forEach(a=>{
      const d = DOMAINS.find(x=>x.key===a.domainKey);
      html += `<div class="qcard">
        <div class="qmeta">${d?d.name:''}</div>
        <div class="qtext" style="margin-bottom:12px;">${esc(a.q.q)}</div>
        <div class="review-line"><span class="muted">Your answer:</span> <span class="amber">${esc(a.q.opts[a.selected])}</span></div>
        <div class="review-line"><span class="muted">Correct answer:</span> <span class="green">${esc(a.q.opts[a.q.correct])}</span></div>
        <div class="explain-box" style="margin-top:12px;"><b>Why:</b> ${esc(a.q.exp)}</div>
      </div>`;
    });
    html += `<button class="primary-btn" onclick="__aplus.goHome()">Back to Dashboard</button>`;
  }

  if(state.modal){
    if(state.modal === "streak"){
      html += `<div class="modal-overlay" onclick="if(event.target===this) __aplus.closeModal()">
        <div class="modal-card">
          <div class="modal-icon">\ud83d\udd25</div>
          <div class="modal-big amber">${state.streak} day${state.streak===1?'':'s'}</div>
          <div class="modal-label">current streak</div>
          <div class="modal-row"><span class="muted">Longest streak</span><span>${state.longestStreak} day${state.longestStreak===1?'':'s'}</span></div>
          <div class="modal-row"><span class="muted">Last active</span><span>${state.lastActiveDate || '\u2014'}</span></div>
          <p class="modal-note">Answer at least one question correctly each day to keep your streak alive. Miss a day and it resets to 1.</p>
          <button class="primary-btn" onclick="__aplus.closeModal()">Close</button>
        </div>
      </div>`;
    } else if(state.modal === "xp"){
      const rows = DOMAINS.map(d=>{
        const s = state.domainStats[d.key];
        const domainXp = s ? s.correct * 10 : 0;
        return `<div class="modal-row"><span class="muted">${d.name}</span><span class="green">${domainXp} XP</span></div>`;
      }).join('');
      html += `<div class="modal-overlay" onclick="if(event.target===this) __aplus.closeModal()">
        <div class="modal-card">
          <div class="modal-icon">\u26a1</div>
          <div class="modal-big green">${state.xp} XP</div>
          <div class="modal-label">total earned</div>
          ${rows}
          <p class="modal-note">+10 XP for every question you answer correctly, in lessons or the diagnostic.</p>
          <button class="primary-btn" onclick="__aplus.closeModal()">Close</button>
        </div>
      </div>`;
    }
  }

  root.innerHTML = html;
}

function topbarHtml(minimal){
  return `<div class="topbar">
    <div class="brand"><span class="green">A+</span><span class="muted">_trainer</span><span class="cursor"></span></div>
    <div class="stat-row">
      <button type="button" class="stat-pill clickable" onclick="__aplus.openModal('streak')">\ud83d\udd25 <span class="amber">${state.streak}</span></button>
      <button type="button" class="stat-pill clickable" onclick="__aplus.openModal('xp')">\u26a1 <span class="green">${state.xp}</span> XP</button>
    </div>
  </div>`;
}

window.__aplus = { startLesson, startDiagnostic, selectOption, nextQuestion, askHint, goHome, openDomain, openReview, backToResults, practiceWeakest, exitQuiz, openModal, closeModal };
loadState();
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => { /* offline support just won't be available */ });
  });
}
</script>
</body>
</html>
