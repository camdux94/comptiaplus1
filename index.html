          exp:"That combination \u2014 unwanted ads, unexplained battery drain, and unfamiliar apps \u2014 is a classic malware symptom cluster on mobile devices, warranting a security scan and review of installed apps/permissions."},
        { q:"A phone's charging port appears bent or has visible debris, and the device charges only intermittently when the cable is wiggled. What does this point to?", opts:["A physically damaged charging port, likely needing cleaning or hardware repair","A software update issue only","A malware infection","A digitizer failure"], correct:0,
          exp:"Intermittent charging tied to cable position, combined with visible physical damage/debris in the port, points strongly to a physical port issue rather than a software problem \u2014 worth trying a careful cleaning first, then hardware repair if that doesn't resolve it."},
        { q:"A user can't install new apps on their phone, receiving an error, even though other functions work normally. What's a reasonable early check?", opts:["Available storage space and whether the device's OS version meets the app's minimum requirements","Assume the phone's screen is broken","Replace the battery","Assume it's always a carrier-level restriction"], correct:0,
          exp:"Failure to install new apps is very commonly caused by insufficient storage space or an OS version that's too old for the app's requirements \u2014 both quick, non-destructive checks before assuming something more serious."}
      ]},
      { key:"tr-5", title:"Display, Projector & Printer Symptoms", questions:[
        { q:"A projector displays a completely blank/dark image, though it powers on and fans are running. What's a common cause to check first?", opts:["A burnt-out projector bulb/lamp","The projector's Wi-Fi settings","The room's ambient lighting","The HDMI cable's color"], correct:0,
          exp:"A projector that powers on normally (fans running, unit responsive) but produces no image is a classic sign of a burnt-out bulb/lamp \u2014 a consumable that has a limited rated lifespan and needs periodic replacement."},
        { q:"A monitor shows a faint, persistent ghost image of previously displayed content, even after changing to a different screen. What is this symptom called?", opts:["Display burn-in / image persistence","Dead pixel","Incorrect color display","Screen flickering"], correct:0,
          exp:"Burn-in (or image persistence on less severe/temporary cases) happens when static content displayed for long periods leaves a lingering ghost image \u2014 more of a risk on OLED but historically also seen on plasma and some LCD panels."},
        { q:"What is a 'dead pixel' on a display?", opts:["A single pixel that fails to light up or display color correctly, remaining a fixed black or wrong-colored dot","A pixel that's brighter than the rest of the screen","A term for the entire screen being unresponsive","A software setting, not a hardware issue"], correct:0,
          exp:"A dead pixel is an individual pixel on the display that's failed and stuck showing black (or occasionally a stuck color), visible as a tiny fixed dot regardless of what's on screen \u2014 a hardware panel defect, not fixable through software."},
        { q:"A presenter connects a laptop to a projector via HDMI, but the projector shows 'no signal' even though the laptop is on. What's a likely first step?", opts:["Confirm the projector's input source is set to the correct HDMI port being used","Assume the projector's bulb has burnt out","Replace the projector entirely","Assume the laptop's motherboard has failed"], correct:0,
          exp:"Projectors with multiple input ports need the correct source manually selected \u2014 'no signal' is very often simply the projector set to look at the wrong input, a quick fix compared to assuming hardware failure."},
        { q:"A laser printer produces a document with a repeating pattern of speckling/spots at regular intervals down the page. What does this suggest?", opts:["A dirty or damaged drum, since the pattern often repeats based on the drum's circumference","The network cable is faulty","The paper size is set incorrectly","The USB cable needs replacing"], correct:0,
          exp:"A speckling pattern that repeats at a consistent interval down the page is a signature symptom of a damaged or dirty drum \u2014 the interval often corresponds to the drum's circumference as it rotates through each print cycle."},
        { q:"A laser printer produces a faint 'echo' or double image of the printed content slightly offset from the original. What's a likely cause?", opts:["A drum or fuser issue causing incomplete toner transfer/fusing in one pass","The paper tray is empty","The scanner glass is dirty","The Wi-Fi signal is weak"], correct:0,
          exp:"Double/echo images are a classic drum or fuser problem \u2014 something in the transfer or fusing process isn't completing cleanly in a single pass, leaving a faint ghost of the image offset from the main print."},
        { q:"A printer repeatedly experiences multipage misfeeds, pulling more than one sheet through at a time. What's a likely cause?", opts:["Paper stuck together (static, humidity, or worn separation rollers) not being properly separated one sheet at a time","The toner cartridge is empty","The network cable is unplugged","The print driver is outdated"], correct:0,
          exp:"Multipage misfeeds usually come down to the paper-separation mechanism failing to do its job \u2014 worn separation rollers, humidity causing sheets to stick together, or overfilled trays are the common culprits."},
        { q:"A print job appears stuck and no other jobs will print after it, even though the printer itself shows as online. What's a reasonable troubleshooting step?", opts:["Clear the frozen/stuck job from the print queue and restart the print spooler service if needed","Replace the printer entirely","Assume the network is completely down","Reformat the print server"], correct:0,
          exp:"A single stuck job can block an entire print queue behind it \u2014 clearing that specific job (and restarting the print spooler service if it won't clear normally) is the standard fix before assuming broader failure."},
        { q:"A printer's paper tray shows as 'not recognized' by the print system, even though paper is loaded correctly. What's a reasonable early check?", opts:["Whether the tray is properly seated/inserted and the tray sensor isn't obstructed or dirty","Assume the entire printer needs replacing","Assume the network cable is at fault","Replace the toner cartridge"], correct:0,
          exp:"A 'tray not recognized' error is often a mechanical issue \u2014 the tray not being fully seated, or a sensor that detects tray presence being dirty/obstructed \u2014 rather than anything at the network or software level."}
      ]},
      { key:"tr-4", title:"Safety, Symptoms & Escalation", questions:[
        { q:"A PC starts emitting a burning smell. What should a technician do FIRST, before any other troubleshooting step?", opts:["Immediately power off and unplug the system for safety, before investigating further","Continue running diagnostics to identify the exact cause","Open the case while it's still powered on to look inside","Ignore it if the computer still boots"], correct:0,
          exp:"A burning smell is a safety issue before it's a troubleshooting puzzle \u2014 power off and unplug immediately to prevent fire risk or further damage, and only investigate once the system is safely de-energized."},
        { q:"What is the purpose of proper ESD (electrostatic discharge) precautions, like an anti-static wrist strap, when working inside a computer?", opts:["Preventing a static discharge from damaging sensitive electronic components","Making cable management easier","Improving airflow inside the case","Preventing screws from being lost"], correct:0,
          exp:"Static discharge from your body can silently damage sensitive components like RAM or a motherboard, even if it's too small for you to feel \u2014 grounding yourself (wrist strap, anti-static mat, or regularly touching bare metal on the case) prevents this."},
        { q:"A computer shows a Blue Screen of Death (BSOD). What's a reasonable first step?", opts:["Note the specific stop code/error shown and research it, rather than immediately reinstalling the OS","Immediately reformat the drive","Assume it's always a virus and run only antivirus software","Replace the power supply without further investigation"], correct:0,
          exp:"BSOD stop codes point to a specific cause (driver conflict, hardware fault, memory issue, etc.). Recording and researching that exact code is far more targeted than jumping straight to a full reinstall or guessing at hardware swaps."},
        { q:"What visual sign on a motherboard often indicates a failing or already-failed capacitor?", opts:["A bulging, swollen, or leaking top on the capacitor","A capacitor that is unusually cold","A capacitor with a bright, shiny finish","There is no visual indicator; capacitors never show wear"], correct:0,
          exp:"A healthy capacitor has a flat top; a bulging, domed, or leaking top is a classic visual sign of capacitor failure, often correlated with system instability, random reboots, or a system that won't POST."},
        { q:"When should a technician escalate an issue to a senior technician or specialist rather than continuing to troubleshoot it themselves?", opts:["When it's outside their expertise, involves risk beyond their authority (e.g., core infrastructure), or they've exhausted reasonable troubleshooting without resolution","Never \u2014 escalating is always a sign of failure","Only if the user demands it","Immediately, for every single ticket regardless of complexity"], correct:0,
          exp:"Escalation is a normal, expected part of the process when a problem exceeds your scope, tools, or authority \u2014 recognizing that boundary (rather than thrashing indefinitely) is itself a professional skill CompTIA expects a technician to have."},
        { q:"A user reports their computer is 'frozen' with a spinning cursor and won't respond to any input. What's a reasonable early step before a hard shutdown?", opts:["Wait briefly to rule out a temporarily busy process, then attempt a graceful close of the unresponsive app (e.g., Task Manager/Force Quit) before resorting to a hard power-off","Immediately hold the power button for 10 seconds every time","Unplug the machine from the wall without warning","Reinstall the OS immediately"], correct:0,
          exp:"A hard power-off risks data loss or file corruption, so the standard order is: give it a moment, try to close the specific unresponsive process gracefully (Task Manager on Windows, Force Quit on Mac), and only hard-reset as a last resort."},

// ---------- State ----------
// Question allocation for the diagnostic mirrors the real 220-1201 exam blueprint weighting,
// so a diagnostic score is actually representative rather than a random slice.
const EXAM_WEIGHTS = { mobile:0.15, networking:0.20, hardware:0.25, virt:0.11, trouble:0.29 };
const DIAGNOSTIC_SIZE = 20;

let state = {
  xp:0, streak:0, longestStreak:0, lastActiveDate:null,
  domainStats:{}, // key -> {correct, total}
  lessonDone:{},  // lessonKey -> true
  diagnosticHistory:[], // [{date, pct, correct, total, domainPct}] newest first
  screen:"home",
  activeDomain:null, activeLesson:null,
  quizQueue:[], quizIndex:0, quizAnswers:[], quizMode:"lesson", // 'lesson' | 'diagnostic'
  selectedOpt:null, answered:false,
  selectedOpts:[], // for multi-select questions
  hint:null, hintLoading:false,
  modal:null // null | 'streak' | 'xp'
};

async function loadState(){
  try{
    const raw = localStorage.getItem('aplus-progress');
    if(raw){ const saved = JSON.parse(raw); state = Object.assign(state, saved, {screen:"home", quizQueue:[], quizIndex:0, quizAnswers:[], selectedOpt:null, selectedOpts:[], answered:false, hint:null, hintLoading:false, modal:null}); }
  }catch(e){ /* no saved state yet */ }
  if(!state.diagnosticHistory) state.diagnosticHistory = [];
  if(!state.longestStreak) state.longestStreak = state.streak || 0;
  render();
}
async function saveState(){
  try{
    const toSave = { xp:state.xp, streak:state.streak, longestStreak:state.longestStreak, lastActiveDate:state.lastActiveDate, domainStats:state.domainStats, lessonDone:state.lessonDone, diagnosticHistory:state.diagnosticHistory };
    localStorage.setItem('aplus-progress', JSON.stringify(toSave));
  }catch(e){ console.error('save failed', e); }
}

function todayStr(){ return new Date().toDateString(); }
function bumpStreak(){
  const today = todayStr();
  if(state.lastActiveDate === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  if(state.lastActiveDate === y.toDateString()) state.streak += 1;
  else state.streak = 1;
  state.lastActiveDate = today;
  if(state.streak > state.longestStreak) state.longestStreak = state.streak;
}

function domainProgress(domain){
  let total=0, done=0;
  domain.lessons.forEach(l=>{ total++; if(state.lessonDone[l.key]) done++; });
  return Math.round((done/total)*100);
}
function allQuestions(){
  let qs=[];
  DOMAINS.forEach(d=>d.lessons.forEach(l=>l.questions.forEach(q=>qs.push({...q, domainKey:d.key, domainName:d.name}))));
  return qs;
}
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startLesson(domainKey, lessonKey){
  const domain = DOMAINS.find(d=>d.key===domainKey);
  const lesson = domain.lessons.find(l=>l.key===lessonKey);
  state.activeDomain = domainKey; state.activeLesson = lessonKey;
  state.quizQueue = lesson.questions.map(q=>({...q, domainKey}));
  state.quizIndex = 0; state.quizAnswers = []; state.quizMode = "lesson";
  state.selectedOpt=null; state.answered=false; state.hint=null; state.selectedOpts=[];
  state.screen = "quiz"; render();
}
function startDiagnostic(){
  const keys = Object.keys(EXAM_WEIGHTS);
  const counts = {}; let allocated = 0;
  keys.forEach(k=>{ const c = Math.round(EXAM_WEIGHTS[k]*DIAGNOSTIC_SIZE); counts[k]=c; allocated+=c; });
  const diff = DIAGNOSTIC_SIZE - allocated;
  if(diff !== 0) counts[keys[keys.length-1]] += diff; // absorb any rounding drift on the last domain
  const pool = allQuestions();
  let qs = [];
  keys.forEach(k=>{
    const domainQs = pool.filter(q=>q.domainKey===k);
    qs = qs.concat(shuffle(domainQs).slice(0, Math.min(counts[k], domainQs.length)));
  });
  qs = shuffle(qs);
  state.quizQueue = qs; state.quizIndex=0; state.quizAnswers=[]; state.quizMode="diagnostic";
  state.selectedOpt=null; state.answered=false; state.hint=null; state.selectedOpts=[];
  state.screen="quiz"; render();
}

function selectOption(i){
  if(state.answered) return;
  const q = state.quizQueue[state.quizIndex];
  if(q.multi) return; // multi-select questions use toggleMultiOption + submitMultiAnswer instead
  state.selectedOpt = i; state.answered = true;
  const isCorrect = i === q.correct;
  state.quizAnswers.push({domainKey:q.domainKey, correct:isCorrect, q:q, selected:i});
  if(!state.domainStats[q.domainKey]) state.domainStats[q.domainKey] = {correct:0,total:0};
  state.domainStats[q.domainKey].total++;
  if(isCorrect){ state.domainStats[q.domainKey].correct++; state.xp += 10; bumpStreak(); }
  saveState();
  render();
}

function toggleMultiOption(i){
  if(state.answered) return;
  const idx = state.selectedOpts.indexOf(i);
  if(idx === -1) state.selectedOpts.push(i);
  else state.selectedOpts.splice(idx, 1);
  render();
}

function submitMultiAnswer(){
  if(state.answered || state.selectedOpts.length === 0) return;
  const q = state.quizQueue[state.quizIndex];
  state.answered = true;
  const selectedSorted = [...state.selectedOpts].sort();
  const correctSorted = [...q.correct].sort();
  const isCorrect = selectedSorted.length === correctSorted.length && selectedSorted.every((v,idx)=>v===correctSorted[idx]);
  state.quizAnswers.push({domainKey:q.domainKey, correct:isCorrect, q:q, selectedMulti:[...state.selectedOpts]});
  if(!state.domainStats[q.domainKey]) state.domainStats[q.domainKey] = {correct:0,total:0};
  state.domainStats[q.domainKey].total++;
  if(isCorrect){ state.domainStats[q.domainKey].correct++; state.xp += 10; bumpStreak(); }
  saveState();
  render();
}

function nextQuestion(){
  state.selectedOpt=null; state.answered=false; state.hint=null; state.selectedOpts=[];
  if(state.quizIndex < state.quizQueue.length - 1){
    state.quizIndex++; render();
  } else {
    if(state.quizMode === "lesson"){
      state.lessonDone[state.activeLesson] = true;
      saveState();
    } else if(state.quizMode === "diagnostic"){
      const total = state.quizAnswers.length;
      const correct = state.quizAnswers.filter(a=>a.correct).length;
      const pct = Math.round((correct/total)*100);
      const byDomain = {};
      state.quizAnswers.forEach(a=>{ if(!byDomain[a.domainKey]) byDomain[a.domainKey]={c:0,t:0}; byDomain[a.domainKey].t++; if(a.correct) byDomain[a.domainKey].c++; });
      const domainPct = {};
      Object.keys(byDomain).forEach(k=> domainPct[k] = Math.round((byDomain[k].c/byDomain[k].t)*100));
      state.diagnosticHistory.unshift({ date:new Date().toISOString(), pct, correct, total, domainPct });
      state.diagnosticHistory = state.diagnosticHistory.slice(0,10);
      saveState();
    }
    state.screen = "results"; render();
  }
}

async function askHint(){
  const q = state.quizQueue[state.quizIndex];
  state.hintLoading = true; render();
  try{
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:200,
        messages:[{ role:"user", content:
          "You are a CompTIA A+ tutor. A student is stuck on this practice question. Give ONE short, Socratic hint (2-3 sentences max) that points them toward the right concept WITHOUT revealing the answer choice or directly naming the correct option text. Question: \""+q.q+"\" Options: "+q.opts.map((o,idx)=>String.fromCharCode(65+idx)+") "+o).join(", ")
        }]
      })
    });
    const data = await resp.json();
    const textBlock = (data.content||[]).find(b=>b.type==="text");
    state.hint = textBlock ? textBlock.text : "Couldn't get a hint right now \u2014 try reasoning through what each option actually does.";
  }catch(e){
    state.hint = "Hint service unavailable right now. Re-read the question and eliminate the options that don't match the core concept being tested.";
  }
  state.hintLoading = false; render();
}

function goHome(){ state.screen="home"; render(); }
function openDomain(key){ state.activeDomain=key; state.screen="domain"; render(); }
function openReview(){ state.screen="review"; render(); }
function backToResults(){ state.screen="results"; render(); }
function exitQuiz(){
  state.selectedOpt=null; state.answered=false; state.hint=null; state.selectedOpts=[];
  if(state.quizMode === "lesson" && state.activeDomain){ openDomain(state.activeDomain); }
  else { goHome(); }
}
function openModal(type){ state.modal = type; render(); }
function closeModal(){ state.modal = null; render(); }
function practiceWeakest(){
  const last = state.diagnosticHistory[0];
  if(!last) return goHome();
  let weakestKey = null, weakestPct = 101;
  Object.keys(last.domainPct).forEach(k=>{ if(last.domainPct[k] < weakestPct){ weakestPct = last.domainPct[k]; weakestKey = k; } });
  if(weakestKey) openDomain(weakestKey); else goHome();
}

// ---------- Render ----------
function esc(s){ const d=document.createElement('div'); d.innerText=s; return d.innerHTML; }

function render(){
  const root = document.getElementById('app-root');
  let html = "";

  if(state.screen === "home"){
    const totalLessons = DOMAINS.reduce((a,d)=>a+d.lessons.length,0);
    const doneLessons = Object.keys(state.lessonDone).length;
    html += topbarHtml();
    html += `<h1 class="title">Core 1 Trainer</h1><p class="subtitle">CompTIA A+ 220-1201</p>`;
    html += `<div class="diag-cta" onclick="__aplus.startDiagnostic()">
      <div class="label"><b>Run Diagnostic Test</b><span class="muted">20 questions, weighted to match the real exam blueprint</span></div>
      <div class="arrow">&gt;_</div>
    </div>`;
    if(state.diagnosticHistory && state.diagnosticHistory.length){
      const last = state.diagnosticHistory[0];
      const prev = state.diagnosticHistory[1];
      const dateStr = new Date(last.date).toLocaleDateString(undefined,{month:'short', day:'numeric'});
      let trendHtml = '<span class="muted">first diagnostic on record</span>';
      if(prev){
        const delta = last.pct - prev.pct;
        const sign = delta>=0 ? '+' : '';
        trendHtml = `<span class="${delta>=0?'green':'amber'}">${sign}${delta}pt</span> <span class="muted">vs previous run</span>`;
      }
      html += `<div class="history-strip">
        <div class="history-main"><b>${last.pct}%</b><span class="muted">last diagnostic \u00b7 ${dateStr}</span></div>
        <div class="history-trend">${trendHtml}</div>
      </div>`;
    }
    DOMAINS.forEach(d=>{
      const pct = domainProgress(d);
      const stat = state.domainStats[d.key];
      const acc = stat && stat.total ? Math.round((stat.correct/stat.total)*100) : null;
      html += `<div class="domain-card" onclick="__aplus.openDomain('${d.key}')">
        <div class="domain-head">
          <div><div class="domain-code">${d.code}</div><div class="domain-name">${d.name}</div></div>
          <div class="domain-pct">${pct}%</div>
        </div>
        <div class="barwrap"><div class="barfill" style="width:${pct}%"></div></div>
        <div class="domain-meta"><span>${d.lessons.length} lessons</span><span>${acc!==null ? 'accuracy '+acc+'%' : 'not started'}</span></div>
      </div>`;
    });
    html += `<div class="empty-note">${doneLessons}/${totalLessons} lessons complete \u2014 keep going.</div>`;
  }

  else if(state.screen === "domain"){
    const d = DOMAINS.find(x=>x.key===state.activeDomain);
    html += topbarHtml();
    html += `<button class="backbtn" onclick="__aplus.goHome()">&lt; back</button>`;
    html += `<div class="domain-code">${d.code}</div><h1 class="title">${d.name}</h1><p class="subtitle">${d.lessons.length} lessons</p>`;
    d.lessons.forEach(l=>{
      const done = state.lessonDone[l.key];
      html += `<div class="lesson-row" onclick="__aplus.startLesson('${d.key}','${l.key}')">
        <div class="lesson-icon ${done?'done':'todo'}">${done?'\u2713':'\u25B8'}</div>
        <div><div class="lesson-title">${l.title}</div><div class="lesson-sub">${l.questions.length} questions</div></div>
      </div>`;
    });
  }

  else if(state.screen === "quiz"){
    const q = state.quizQueue[state.quizIndex];
    const pct = Math.round(((state.quizIndex)/state.quizQueue.length)*100);
    html += topbarHtml(true);
    html += `<button class="backbtn" onclick="__aplus.exitQuiz()">&lt; exit ${state.quizMode==='diagnostic'?'diagnostic':'lesson'}</button>`;
    html += `<div class="progressbar-top"><div class="progressbar-top-fill" style="width:${pct}%"></div></div>`;
    html += `<div class="qcard">
      <div class="qmeta">QUESTION ${state.quizIndex+1} / ${state.quizQueue.length} ${state.quizMode==='diagnostic' ? '\u00b7 '+q.domainName : ''}${q.multi ? ' \u00b7 SELECT '+q.correct.length : ''}</div>
      <div class="qtext">${esc(q.q)}</div>
    </div>`;

    if(q.multi){
      q.opts.forEach((opt,i)=>{
        let cls = "opt";
        const isSelected = state.selectedOpts.includes(i);
        const isCorrectOpt = q.correct.includes(i);
        if(state.answered){
          if(isCorrectOpt && isSelected) cls += " correct";
          else if(isCorrectOpt && !isSelected) cls += " missed";
          else if(!isCorrectOpt && isSelected) cls += " incorrect";
          else cls += " faded";
        } else if(isSelected){
          cls += " selected";
        }
        html += `<button class="${cls}" ${state.answered?'disabled':''} onclick="__aplus.toggleMultiOption(${i})">${esc(opt)}</button>`;
      });
      if(!state.answered){
        html += `<button class="primary-btn" onclick="__aplus.submitMultiAnswer()" ${state.selectedOpts.length===0?'disabled':''}>Submit (${state.selectedOpts.length} selected)</button>`;
        html += `<button class="hint-btn" onclick="__aplus.askHint()" ${state.hintLoading?'disabled':''}>${state.hintLoading?'thinking\u2026':'\ud83d\udca1 Ask for a hint'}</button>`;
        if(state.hint) html += `<div class="hint-box">${esc(state.hint)}</div>`;
      } else {
        const lastAnswer = state.quizAnswers[state.quizAnswers.length-1];
        const isCorrect = lastAnswer.correct;
        html += `<div class="feedback-banner ${isCorrect?'ok':'bad'}">${isCorrect?'CORRECT':'INCORRECT'}</div>`;
        html += `<div class="explain-box"><b>Why:</b> ${esc(q.exp)}</div>`;
        html += `<button class="primary-btn" onclick="__aplus.nextQuestion()">Continue</button>`;
      }
    } else {
      q.opts.forEach((opt,i)=>{
        let cls = "opt";
        if(state.answered){
          if(i===q.correct) cls += " correct";
          else if(i===state.selectedOpt) cls += " incorrect";
          else cls += " faded";
        }
        html += `<button class="${cls}" ${state.answered?'disabled':''} onclick="__aplus.selectOption(${i})">${esc(opt)}</button>`;
      });
      if(!state.answered){
        html += `<button class="hint-btn" onclick="__aplus.askHint()" ${state.hintLoading?'disabled':''}>${state.hintLoading?'thinking\u2026':'\ud83d\udca1 Ask for a hint'}</button>`;
        if(state.hint) html += `<div class="hint-box">${esc(state.hint)}</div>`;
      }
      if(state.answered){
        const isCorrect = state.selectedOpt === q.correct;
        html += `<div class="feedback-banner ${isCorrect?'ok':'bad'}">${isCorrect?'CORRECT':'INCORRECT'}</div>`;
        html += `<div class="explain-box"><b>Why:</b> ${esc(q.exp)}</div>`;
        html += `<button class="primary-btn" onclick="__aplus.nextQuestion()">Continue</button>`;
      }
    }
  }

  else if(state.screen === "results"){
    const total = state.quizAnswers.length;
    const correct = state.quizAnswers.filter(a=>a.correct).length;
    const pct = Math.round((correct/total)*100);
    const circumference = 2*Math.PI*64;
    const offset = circumference - (pct/100)*circumference;
    html += topbarHtml();
    html += `<h1 class="title">${state.quizMode==='diagnostic'?'Diagnostic Results':'Lesson Complete'}</h1>`;
    html += `<div class="result-ring">
      <svg width="150" height="150"><circle cx="75" cy="75" r="64" stroke="#1f2e1f" stroke-width="10" fill="none"/>
      <circle cx="75" cy="75" r="64" stroke="#00FF41" stroke-width="10" fill="none" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>
      <div class="pct"><b>${pct}%</b><span>${correct}/${total} correct</span></div>
    </div>`;
    const missedCount = state.quizAnswers.filter(a=>!a.correct).length;
    if(state.quizMode === "diagnostic"){
      const prev = state.diagnosticHistory[1];
      if(prev){
        const delta = pct - prev.pct;
        const sign = delta>=0 ? '+' : '';
        html += `<div class="trend-line ${delta>=0?'green':'amber'}">${sign}${delta}pt vs your last diagnostic (${prev.pct}%)</div>`;
      }
      const byDomain = {};
      state.quizAnswers.forEach(a=>{ if(!byDomain[a.domainKey]) byDomain[a.domainKey]={c:0,t:0}; byDomain[a.domainKey].t++; if(a.correct) byDomain[a.domainKey].c++; });
      Object.keys(byDomain).forEach(k=>{
        const d = DOMAINS.find(x=>x.key===k);
        const p = Math.round((byDomain[k].c/byDomain[k].t)*100);
        html += `<div class="breakdown-row clickable" onclick="__aplus.openDomain('${k}')"><span>${d.name}</span><span>${p<70?'<span class="weak">WEAK &middot; </span>':''}${p}%</span></div>`;
      });
      html += `<button class="ghost-btn" onclick="__aplus.practiceWeakest()">Practice weakest domain \u2192</button>`;
    }
    if(missedCount > 0){
      html += `<button class="ghost-btn" onclick="__aplus.openReview()">Review ${missedCount} missed question${missedCount>1?'s':''}</button>`;
    }
    html += `<button class="primary-btn" onclick="__aplus.goHome()">Back to Dashboard</button>`;
  }

  else if(state.screen === "review"){
    html += topbarHtml();
    html += `<button class="backbtn" onclick="__aplus.backToResults()">&lt; back to results</button>`;
    html += `<h1 class="title">Missed Questions</h1><p class="subtitle">Review why, not just what</p>`;
    const missed = state.quizAnswers.filter(a=>!a.correct);
    if(missed.length === 0){
      html += `<div class="empty-note">Nothing missed \u2014 clean run.</div>`;
    }
    missed.forEach(a=>{
      const d = DOMAINS.find(x=>x.key===a.domainKey);
      let answerLines;
      if(a.q.multi){
        const yourAnswer = a.selectedMulti.map(i=>a.q.opts[i]).join(', ') || '(nothing selected)';
        const correctAnswer = a.q.correct.map(i=>a.q.opts[i]).join(', ');
        answerLines = `
        <div class="review-line"><span class="muted">Your answer:</span> <span class="amber">${esc(yourAnswer)}</span></div>
        <div class="review-line"><span class="muted">Correct answer:</span> <span class="green">${esc(correctAnswer)}</span></div>`;
      } else {
        answerLines = `
        <div class="review-line"><span class="muted">Your answer:</span> <span class="amber">${esc(a.q.opts[a.selected])}</span></div>
        <div class="review-line"><span class="muted">Correct answer:</span> <span class="green">${esc(a.q.opts[a.q.correct])}</span></div>`;
      }
      html += `<div class="qcard">
        <div class="qmeta">${d?d.name:''}</div>
        <div class="qtext" style="margin-bottom:12px;">${esc(a.q.q)}</div>
        ${answerLines}
        <div class="explain-box" style="margin-top:12px;"><b>Why:</b> ${esc(a.q.exp)}</div>
      </div>`;
    });
    html += `<button class="primary-btn" onclick="__aplus.goHome()">Back to Dashboard</button>`;
  }

  if(state.modal){
    if(state.modal === "streak"){
      html += `<div class="modal-overlay" onclick="if(event.target===this) __aplus.closeModal()">
        <div class="modal-card">
          <div class="modal-icon">\ud83d\udd25</div>
          <div class="modal-big amber">${state.streak} day${state.streak===1?'':'s'}</div>
          <div class="modal-label">current streak</div>
          <div class="modal-row"><span class="muted">Longest streak</span><span>${state.longestStreak} day${state.longestStreak===1?'':'s'}</span></div>
          <div class="modal-row"><span class="muted">Last active</span><span>${state.lastActiveDate || '\u2014'}</span></div>
          <p class="modal-note">Answer at least one question correctly each day to keep your streak alive. Miss a day and it resets to 1.</p>
          <button class="primary-btn" onclick="__aplus.closeModal()">Close</button>
        </div>
      </div>`;
    } else if(state.modal === "xp"){
      const rows = DOMAINS.map(d=>{
        const s = state.domainStats[d.key];
        const domainXp = s ? s.correct * 10 : 0;
        return `<div class="modal-row"><span class="muted">${d.name}</span><span class="green">${domainXp} XP</span></div>`;
      }).join('');
      html += `<div class="modal-overlay" onclick="if(event.target===this) __aplus.closeModal()">
        <div class="modal-card">
          <div class="modal-icon">\u26a1</div>
          <div class="modal-big green">${state.xp} XP</div>
          <div class="modal-label">total earned</div>
          ${rows}
          <p class="modal-note">+10 XP for every question you answer correctly, in lessons or the diagnostic.</p>
          <button class="primary-btn" onclick="__aplus.closeModal()">Close</button>
        </div>
      </div>`;
    }
  }

  root.innerHTML = html;
}

function topbarHtml(minimal){
  return `<div class="topbar">
    <div class="brand"><span class="green">A+</span><span class="muted">_trainer</span><span class="cursor"></span></div>
    <div class="stat-row">
      <button type="button" class="stat-pill clickable" onclick="__aplus.openModal('streak')">\ud83d\udd25 <span class="amber">${state.streak}</span></button>
      <button type="button" class="stat-pill clickable" onclick="__aplus.openModal('xp')">\u26a1 <span class="green">${state.xp}</span> XP</button>
    </div>
  </div>`;
}

window.__aplus = { startLesson, startDiagnostic, selectOption, nextQuestion, askHint, goHome, openDomain, openReview, backToResults, practiceWeakest, exitQuiz, openModal, closeModal, toggleMultiOption, submitMultiAnswer };
loadState();
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {

}
